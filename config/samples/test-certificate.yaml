# Sample TLS Secret for testing the certificate rotation operator
# This creates a test certificate that expires in 15 days
# After deploying the CertificateRotation CR, this certificate should trigger an alert

apiVersion: v1
kind: Namespace
metadata:
  name: cert-test
---
apiVersion: v1
kind: Secret
metadata:
  name: test-tls-cert
  namespace: cert-test
type: kubernetes.io/tls
data:
  # This is a sample self-signed certificate expiring soon
  # In production, replace with actual certificate data
  # To generate a test cert expiring in 15 days:
  # openssl req -x509 -newkey rsa:2048 -keyout tls.key -out tls.crt -days 15 -nodes -subj "/CN=test.example.com"
  # Then base64 encode: cat tls.crt | base64 -w0

  tls.crt: 
  tls.key: LS0tLS1CRUdJTiBQUklWQVRFIEtFWS0tLS0tCk1JSUV2UUlCQURBTkJna3Foa2lHOXcwQkFRRUZBQVNDQktjd2dnU2pBZ0VBQW9JQkFRQzMyRmRXTzFMd1pwMXkKeWUyMmUrbm REMOVED FOR BREVITY
